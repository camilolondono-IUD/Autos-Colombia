<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Autos Colombia</title>

<!-- ruta al CSS -->
<link rel="stylesheet" href="../css/login.css">

</head>

<body>

<div class="login-container">

    <h2>Autos Colombia</h2>
    <p>Inicio de sesión</p>

    <form id="loginForm">

        <div class="input-group">
            <label>Usuario</label>
            <input type="text" id="usuario" placeholder="Usuario valido admin">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="Contraseña valida 12345">
        </div>

        <button type="submit" class="btn-login">Iniciar Sesión</button>

        <p id="mensajeError" class="error"></p>

    </form>

</div>

<!-- ruta al JS -->
<script src="../js/login.js"></script>

</body>
</html>
